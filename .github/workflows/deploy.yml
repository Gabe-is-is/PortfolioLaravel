name: Deploy Laravel via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    environment: Produção
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, ctype, json, bcmath, pdo_mysql
          coverage: none

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependências PHP
        run: |
          composer install \
            --no-dev \
            --optimize-autoloader \
            --prefer-dist \
            --no-interaction

      - name: Instalar dependências Node
        run: npm install

      - name: Build Frontend
        run: npm run build

      - name: Limpar arquivos desnecessários
        run: |
          rm -rf node_modules
          rm -rf tests
          rm -rf .git
          rm -rf .github

      - name: Compactar aplicação
        run: |
          zip -r deploy.zip . \
            -x "*.git*" \
            -x "storage/logs/*" \
            -x ".env"

      - name: Enviar ZIP via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./
          server-dir: /deploy/
          include: |
            deploy.zip

      - name: Executar deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /var/www/site

            rm -rf vendor_old
            rm -rf public/build_old

            unzip -o /home/usuario/deploy/deploy.zip -d .

            php artisan migrate --force

            php artisan config:clear
            php artisan route:clear
            php artisan view:clear

            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            rm -f /home/usuario/deploy/deploy.zip
